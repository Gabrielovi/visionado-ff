<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visionado FF</title>
<style>
  :root {
    --bg: #0e0e0e;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --text2: #9a9690;
    --text3: #5a5754;
    --accent: #c8b89a;
    --sel: #2a3d2a;
    --sel-text: #7ec87e;
    --pen: #3a3020;
    --pen-text: #d4a847;
    --disc: #3a1e1e;
    --disc-text: #d47070;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; }
  a { color: var(--text2); }

  /* HEADER */
  .site-header { border-bottom: 0.5px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .site-title { font-size: 15px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); font-family: 'Georgia', serif; }
  .header-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .stats-inline { font-size: 12px; color: var(--text3); display: flex; gap: 14px; }
  .stats-inline span { color: var(--text2); }
  .btn-add { display: flex; align-items: center; gap: 6px; padding: 7px 16px; background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 12px; cursor: pointer; color: var(--accent); letter-spacing: 0.05em; font-family: inherit; transition: background 0.15s; }
  .btn-add:hover { background: var(--bg3); }

  /* FILTERS */
  .filter-bar { padding: 0.75rem 2rem; border-bottom: 0.5px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .ftag { padding: 3px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 0.5px solid transparent; color: var(--text3); background: transparent; font-family: inherit; transition: all 0.12s; letter-spacing: 0.04em; }
  .ftag:hover { color: var(--text2); border-color: var(--border); }
  .ftag.active { color: var(--text); border-color: var(--border2); background: var(--bg3); }
  .fsep { color: var(--border2); font-size: 10px; padding: 0 4px; }
  .fstatus { padding: 3px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 0.5px solid transparent; font-family: inherit; transition: all 0.12s; letter-spacing: 0.04em; }
  .fstatus-all { color: var(--text3); }
  .fstatus-all.active { color: var(--text); border-color: var(--border2); background: var(--bg3); }
  .fstatus-sel { color: var(--sel-text); }
  .fstatus-sel.active { background: var(--sel); border-color: var(--sel-text); }
  .fstatus-pen { color: var(--pen-text); }
  .fstatus-pen.active { background: var(--pen); border-color: var(--pen-text); }
  .fstatus-disc { color: var(--disc-text); }
  .fstatus-disc.active { background: var(--disc); border-color: var(--disc-text); }

  /* GRID */
  .main { padding: 1.5rem 2rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.15s; }
  .card:hover { border-color: var(--border2); }
  .card-embed { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
  .card-embed iframe { width: 100%; height: 100%; border: none; display: block; }
  .card-body { padding: 12px 14px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card-title { font-size: 13px; color: var(--text); line-height: 1.4; flex: 1; font-family: 'Georgia', serif; }
  .sbadge { flex-shrink: 0; font-size: 10px; padding: 2px 9px; border-radius: 10px; cursor: pointer; letter-spacing: 0.04em; font-family: inherit; border: none; transition: opacity 0.1s; }
  .sbadge:hover { opacity: 0.75; }
  .sbadge-pending { background: var(--pen); color: var(--pen-text); }
  .sbadge-selected { background: var(--sel); color: var(--sel-text); }
  .sbadge-discarded { background: var(--disc); color: var(--disc-text); }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .ctag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border); letter-spacing: 0.03em; }
  .card-note { font-size: 12px; color: var(--text2); background: var(--bg3); border-radius: var(--radius); padding: 7px 10px; line-height: 1.6; margin-bottom: 8px; cursor: pointer; min-height: 34px; border: 0.5px solid transparent; transition: border-color 0.12s; font-style: italic; }
  .card-note:hover { border-color: var(--border); }
  .card-note.empty { color: var(--text3); font-style: italic; }
  .card-meta { font-size: 10px; color: var(--text3); letter-spacing: 0.03em; }
  .card-meta a { color: var(--text3); text-decoration: none; }
  .card-meta a:hover { color: var(--text2); }

  /* EMPTY / LOADING */
  .empty { text-align: center; padding: 4rem 1rem; color: var(--text3); font-size: 13px; }
  .loading { text-align: center; padding: 4rem; color: var(--text3); font-size: 12px; letter-spacing: 0.1em; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
  .overlay.show { display: flex; }
  .modal { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); padding: 1.5rem; width: min(480px, 92vw); max-height: 85vh; overflow-y: auto; }
  .modal h3 { font-size: 14px; font-weight: normal; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.25rem; font-family: 'Georgia', serif; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 5px; letter-spacing: 0.06em; text-transform: uppercase; }
  .field input, .field textarea, .field select {
    width: 100%; font-size: 13px; padding: 8px 11px;
    background: var(--bg3); border: 0.5px solid var(--border2);
    border-radius: var(--radius); color: var(--text);
    font-family: 'Georgia', serif; resize: vertical;
    transition: border-color 0.12s;
  }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .field select option { background: var(--bg3); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .btn-cancel { padding: 7px 16px; background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 12px; cursor: pointer; color: var(--text2); font-family: inherit; }
  .btn-cancel:hover { background: var(--bg3); }
  .btn-save { padding: 7px 16px; background: transparent; border: 0.5px solid var(--accent); border-radius: var(--radius); font-size: 12px; cursor: pointer; color: var(--accent); font-family: inherit; letter-spacing: 0.05em; }
  .btn-save:hover { background: rgba(200,184,154,0.08); }
  .tag-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .tag-pill { font-size: 11px; padding: 3px 10px; border-radius: 10px; background: var(--bg3); border: 0.5px solid var(--border); cursor: pointer; color: var(--text3); font-family: inherit; transition: all 0.1s; }
  .tag-pill:hover { color: var(--text2); border-color: var(--border2); }
  .tag-pill.on { background: rgba(200,184,154,0.1); border-color: var(--accent); color: var(--accent); }
  .avail-label { font-size: 10px; color: var(--text3); letter-spacing: 0.05em; display: block; margin-top: 8px; text-transform: uppercase; }
  .error-msg { font-size: 11px; color: var(--disc-text); margin-top: 6px; display: none; }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-title">Visionado FF</div>
  <div class="header-right">
    <div class="stats-inline" id="stats"></div>
    <button class="btn-add" onclick="openAdd()">+ Agregar pieza</button>
  </div>
</header>

<div class="filter-bar" id="filter-bar"></div>

<main class="main">
  <div class="loading" id="loading">Cargando colección…</div>
  <div class="grid" id="grid" style="display:none"></div>
  <div class="empty" id="empty" style="display:none">Sin piezas con ese filtro.</div>
</main>

<!-- Modal agregar/editar -->
<div class="overlay" id="modal-add">
  <div class="modal">
    <h3 id="modal-title">Nueva pieza</h3>
    <div class="field">
      <label>URL (Internet Archive, YouTube, Vimeo)</label>
      <input type="text" id="f-url" placeholder="https://archive.org/details/..." />
    </div>
    <div class="field">
      <label>Título</label>
      <input type="text" id="f-title" placeholder="Nombre de la pieza" />
    </div>
    <div class="field">
      <label>Año / fuente</label>
      <input type="text" id="f-meta" placeholder="ej. 1968 · Prelinger Archives" />
    </div>
    <div class="field">
      <label>Nota</label>
      <textarea id="f-note" rows="3" placeholder="Impresiones, contexto, relevancia…"></textarea>
    </div>
    <div class="field">
      <label>Etiquetas</label>
      <span class="avail-label">Etiquetas existentes</span>
      <div class="tag-pills" id="avail-tags"></div>
      <input type="text" id="f-newtag" placeholder="Nueva etiqueta → Enter" style="margin-top:8px" />
      <div class="tag-pills" id="sel-tags" style="margin-top:6px"></div>
    </div>
    <div class="field">
      <label>Estado</label>
      <select id="f-status">
        <option value="pending">En revisión</option>
        <option value="selected">Seleccionada</option>
        <option value="discarded">Descartada</option>
      </select>
    </div>
    <div class="error-msg" id="err-msg">URL y título son obligatorios.</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAdd()">Cancelar</button>
      <button class="btn-save" id="btn-save-label" onclick="saveItem()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal nota -->
<div class="overlay" id="modal-note">
  <div class="modal">
    <h3>Nota</h3>
    <div class="field">
      <textarea id="note-text" rows="5" style="min-height:100px"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeNote()">Cancelar</button>
      <button class="btn-save" onclick="saveNote()">Guardar</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vraxnskpfiqzbwxonyde.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyYXhuc2twZmlxemJ3eG9ueWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTgwNjcsImV4cCI6MjA5NjI3NDA2N30.JTR2R36d44FIf9eYrctCzoudp3eI3tRFuCAtYn5jm5A';
const API = `${SUPABASE_URL}/rest/v1/pieces`;
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

let items = [];
let activeTag = 'all';
let activeSt = 'all';
let editingId = null;
let editingNoteId = null;
let selTags = [];

async function fetchAll() {
  const r = await fetch(`${API}?order=created_at.desc`, { headers: HEADERS });
  items = await r.json();
  render();
}

async function apiInsert(data) {
  const r = await fetch(API, { method: 'POST', headers: HEADERS, body: JSON.stringify(data) });
  return r.json();
}

async function apiUpdate(id, data) {
  await fetch(`${API}?id=eq.${id}`, { method: 'PATCH', headers: HEADERS, body: JSON.stringify(data) });
}

async function apiDelete(id) {
  await fetch(`${API}?id=eq.${id}`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
}

function allTags() {
  const t = new Set();
  items.forEach(i => (i.tags || []).forEach(tag => t.add(tag)));
  return [...t].sort();
}

function embedUrl(url) {
  if (!url) return null;
  if (url.includes('archive.org/details/')) {
    const id = url.split('archive.org/details/')[1].split('/')[0].split('?')[0];
    return `https://archive.org/embed/${id}`;
  }
  if (url.includes('youtube.com/watch')) {
    const v = new URLSearchParams(url.split('?')[1]).get('v');
    return `https://www.youtube.com/embed/${v}`;
  }
  if (url.includes('youtu.be/')) return `https://www.youtube.com/embed/${url.split('youtu.be/')[1].split('?')[0]}`;
  if (url.includes('vimeo.com/')) return `https://player.vimeo.com/video/${url.split('vimeo.com/')[1].split('?')[0]}`;
  return null;
}

function statusLabel(s) { return { pending: 'en revisión', selected: 'seleccionada', discarded: 'descartada' }[s] || s; }
function statusClass(s) { return { pending: 'sbadge-pending', selected: 'sbadge-selected', discarded: 'sbadge-discarded' }[s]; }

function render() {
  document.getElementById('loading').style.display = 'none';
  const filtered = items.filter(i => {
    const t = activeTag === 'all' || (i.tags || []).includes(activeTag);
    const s = activeSt === 'all' || i.status === activeSt;
    return t && s;
  });

  const total = items.length, sel = items.filter(i => i.status === 'selected').length,
        pen = items.filter(i => i.status === 'pending').length, disc = items.filter(i => i.status === 'discarded').length;
  document.getElementById('stats').innerHTML =
    `<span>${total} piezas</span><span style="color:var(--sel-text)">${sel} sel.</span><span style="color:var(--pen-text)">${pen} rev.</span><span style="color:var(--disc-text)">${disc} desc.</span>`;

  const tags = allTags();
  document.getElementById('filter-bar').innerHTML =
    `<button class="ftag ${activeTag==='all'?'active':''}" onclick="setTag('all')">Todas</button>` +
    tags.map(t => `<button class="ftag ${activeTag===t?'active':''}" onclick="setTag('${t}')">${t}</button>`).join('') +
    `<span class="fsep">·</span>
    <button class="fstatus fstatus-all ${activeSt==='all'?'active':''}" onclick="setSt('all')">todo</button>
    <button class="fstatus fstatus-sel ${activeSt==='selected'?'active':''}" onclick="setSt('selected')">seleccionadas</button>
    <button class="fstatus fstatus-pen ${activeSt==='pending'?'active':''}" onclick="setSt('pending')">en revisión</button>
    <button class="fstatus fstatus-disc ${activeSt==='discarded'?'active':''}" onclick="setSt('discarded')">descartadas</button>`;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (filtered.length === 0) { grid.style.display = 'none'; empty.style.display = 'block'; return; }
  empty.style.display = 'none'; grid.style.display = 'grid';
  grid.innerHTML = filtered.map(item => {
    const emb = embedUrl(item.url);
    const note = item.note || '';
    return `<div class="card">
      ${emb ? `<div class="card-embed"><iframe src="${emb}" allow="fullscreen" loading="lazy"></iframe></div>` : ''}
      <div class="card-body">
        <div class="card-top">
          <span class="card-title">${item.title}</span>
          <button class="sbadge ${statusClass(item.status)}" onclick="cycleStatus(${item.id})">${statusLabel(item.status)}</button>
        </div>
        ${(item.tags||[]).length ? `<div class="card-tags">${item.tags.map(t=>`<span class="ctag">${t}</span>`).join('')}</div>` : ''}
        <div class="card-note ${note?'':'empty'}" onclick="openNote(${item.id})">${note || 'agregar nota…'}</div>
        <div class="card-meta">
          ${item.meta ? item.meta + ' · ' : ''}
          <a href="${item.url}" target="_blank">ver original ↗</a>
          · <span style="cursor:pointer;color:var(--text3)" onclick="openEdit(${item.id})">editar</span>
          · <span style="cursor:pointer;color:var(--disc-text)" onclick="deleteItem(${item.id})">eliminar</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setTag(t) { activeTag = t; render(); }
function setSt(s) { activeSt = s; render(); }

async function cycleStatus(id) {
  const item = items.find(i => i.id === id);
  const cycle = { pending: 'selected', selected: 'discarded', discarded: 'pending' };
  item.status = cycle[item.status];
  render();
  await apiUpdate(id, { status: item.status });
}

function openNote(id) {
  editingNoteId = id;
  document.getElementById('note-text').value = items.find(i => i.id === id).note || '';
  document.getElementById('modal-note').classList.add('show');
}
function closeNote() { document.getElementById('modal-note').classList.remove('show'); }
async function saveNote() {
  const note = document.getElementById('note-text').value;
  items.find(i => i.id === editingNoteId).note = note;
  render();
  await apiUpdate(editingNoteId, { note });
  closeNote();
}

function renderModalTags() {
  const existing = allTags();
  document.getElementById('avail-tags').innerHTML = existing.map(t =>
    `<button class="tag-pill ${selTags.includes(t)?'on':''}" onclick="toggleTag('${t}')">${t}</button>`).join('');
  document.getElementById('sel-tags').innerHTML = selTags.map(t =>
    `<button class="tag-pill on" onclick="toggleTag('${t}')">${t} ×</button>`).join('');
}
function toggleTag(t) {
  selTags = selTags.includes(t) ? selTags.filter(x=>x!==t) : [...selTags, t];
  renderModalTags();
}

function openAdd() {
  editingId = null; selTags = [];
  document.getElementById('f-url').value = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-meta').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-status').value = 'pending';
  document.getElementById('modal-title').textContent = 'Nueva pieza';
  document.getElementById('btn-save-label').textContent = 'Agregar';
  document.getElementById('err-msg').style.display = 'none';
  renderModalTags();
  document.getElementById('modal-add').classList.add('show');
}

function openEdit(id) {
  const item = items.find(i => i.id === id);
  editingId = id; selTags = [...(item.tags || [])];
  document.getElementById('f-url').value = item.url;
  document.getElementById('f-title').value = item.title;
  document.getElementById('f-meta').value = item.meta || '';
  document.getElementById('f-note').value = item.note || '';
  document.getElementById('f-status').value = item.status;
  document.getElementById('modal-title').textContent = 'Editar pieza';
  document.getElementById('btn-save-label').textContent = 'Guardar cambios';
  document.getElementById('err-msg').style.display = 'none';
  renderModalTags();
  document.getElementById('modal-add').classList.add('show');
}

function closeAdd() { document.getElementById('modal-add').classList.remove('show'); }

async function saveItem() {
  const url = document.getElementById('f-url').value.trim();
  const title = document.getElementById('f-title').value.trim();
  if (!url || !title) { document.getElementById('err-msg').style.display = 'block'; return; }
  const data = { url, title, meta: document.getElementById('f-meta').value.trim(), note: document.getElementById('f-note').value.trim(), tags: selTags, status: document.getElementById('f-status').value };
  closeAdd();
  if (editingId) {
    Object.assign(items.find(i => i.id === editingId), data);
    render();
    await apiUpdate(editingId, data);
  } else {
    const result = await apiInsert(data);
    if (Array.isArray(result) && result[0]) items.unshift(result[0]);
    render();
  }
}

async function deleteItem(id) {
  if (!confirm('¿Eliminar esta pieza?')) return;
  items = items.filter(i => i.id !== id);
  render();
  await apiDelete(id);
}

document.getElementById('f-newtag').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const v = e.target.value.trim();
    if (v && !selTags.includes(v)) selTags.push(v);
    e.target.value = '';
    renderModalTags();
  }
});
document.getElementById('modal-add').addEventListener('click', e => { if (e.target === document.getElementById('modal-add')) closeAdd(); });
document.getElementById('modal-note').addEventListener('click', e => { if (e.target === document.getElementById('modal-note')) closeNote(); });

fetchAll();
</script>
</body>
</html>
