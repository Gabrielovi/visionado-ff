<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visionado FF</title>
<style>
  :root{--bg:#0e0e0e;--bg2:#161616;--bg3:#1e1e1e;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0ede8;--text2:#9a9690;--text3:#5a5754;--accent:#c8b89a;--sel:#2a3d2a;--sel-t:#7ec87e;--pen:#3a3020;--pen-t:#d4a847;--disc:#3a1e1e;--disc-t:#d47070;--r:8px;--rl:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;}
  a{color:var(--text2);}
  .hdr{border-bottom:0.5px solid var(--border);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
  .htitle{font-size:15px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);}
  .hright{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
  .stats{font-size:12px;color:var(--text3);display:flex;gap:14px;}
  .stats span{color:var(--text2);}
  .btnadd{display:flex;align-items:center;gap:6px;padding:7px 16px;background:transparent;border:0.5px solid var(--border2);border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--accent);letter-spacing:0.05em;font-family:inherit;transition:background 0.15s;}
  .btnadd:hover{background:var(--bg3);}
  .tabs{display:flex;border-bottom:0.5px solid var(--border);padding:0 2rem;}
  .tab{padding:0.75rem 1.25rem;font-size:12px;cursor:pointer;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-0.5px;font-family:inherit;background:transparent;border-top:none;border-left:none;border-right:none;transition:color 0.15s;}
  .tab:hover{color:var(--text2);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .fbar{padding:0.75rem 2rem;border-bottom:0.5px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .ftag{padding:3px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:0.5px solid transparent;color:var(--text3);background:transparent;font-family:inherit;transition:all 0.12s;letter-spacing:0.04em;}
  .ftag:hover{color:var(--text2);border-color:var(--border);}
  .ftag.active{color:var(--text);border-color:var(--border2);background:var(--bg3);}
  .fsep{color:var(--border2);font-size:10px;padding:0 4px;}
  .fst{padding:3px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:0.5px solid transparent;font-family:inherit;transition:all 0.12s;letter-spacing:0.04em;}
  .fst-all{color:var(--text3);}
  .fst-all.active{color:var(--text);border-color:var(--border2);background:var(--bg3);}
  .fst-s{color:var(--sel-t);}
  .fst-s.active{background:var(--sel);border-color:var(--sel-t);}
  .fst-p{color:var(--pen-t);}
  .fst-p.active{background:var(--pen);border-color:var(--pen-t);}
  .fst-d{color:var(--disc-t);}
  .fst-d.active{background:var(--disc);border-color:var(--disc-t);}
  .main{padding:1.5rem 2rem;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
  .card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:border-color 0.15s;}
  .card:hover{border-color:var(--border2);}
  .cembed{width:100%;aspect-ratio:16/9;background:#000;}
  .cembed iframe{width:100%;height:100%;border:none;display:block;}
  .cbody{padding:12px 14px;}
  .ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .ctitle{font-size:13px;color:var(--text);line-height:1.4;flex:1;}
  .sbadge{flex-shrink:0;font-size:10px;padding:2px 9px;border-radius:10px;cursor:pointer;letter-spacing:0.04em;font-family:inherit;border:none;transition:opacity 0.1s;}
  .sbadge:hover{opacity:0.75;}
  .sb-p{background:var(--pen);color:var(--pen-t);}
  .sb-s{background:var(--sel);color:var(--sel-t);}
  .sb-d{background:var(--disc);color:var(--disc-t);}
  .ctags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
  .ctag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--text3);border:0.5px solid var(--border);letter-spacing:0.03em;}
  .cnote{font-size:12px;color:var(--text2);background:var(--bg3);border-radius:var(--r);padding:7px 10px;line-height:1.6;margin-bottom:8px;cursor:pointer;min-height:34px;border:0.5px solid transparent;transition:border-color 0.12s;font-style:italic;}
  .cnote:hover{border-color:var(--border);}
  .cnote.empty{color:var(--text3);}
  .cmeta{font-size:10px;color:var(--text3);letter-spacing:0.03em;}
  .cmeta a{color:var(--text3);text-decoration:none;}
  .cmeta a:hover{color:var(--text2);}
  .pizarra{padding:1.5rem 2rem;}
  .piz-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px;}
  .piz-hdr h2{font-size:13px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;font-weight:normal;}
  .cpicker{display:flex;gap:6px;align-items:center;}
  .cdot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.1s;}
  .cdot.active{border-color:var(--text2);}
  .cd-y{background:#d4c46a;}.cd-g{background:#7ec8a0;}.cd-b{background:#7ab0d4;}.cd-p{background:#b89ad4;}.cd-r{background:#d47a7a;}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
  .postit{border-radius:var(--r);padding:14px;min-height:140px;display:flex;flex-direction:column;gap:8px;position:relative;}
  .pt-y{background:#2a2710;border:0.5px solid #d4c46a33;}
  .pt-g{background:#102a1a;border:0.5px solid #7ec8a033;}
  .pt-b{background:#101e2a;border:0.5px solid #7ab0d433;}
  .pt-p{background:#1e102a;border:0.5px solid #b89ad433;}
  .pt-r{background:#2a1010;border:0.5px solid #d47a7a33;}
  .paut{font-size:10px;letter-spacing:0.06em;text-transform:uppercase;opacity:0.6;}
  .pt-y .paut{color:#d4c46a;}.pt-g .paut{color:#7ec8a0;}.pt-b .paut{color:#7ab0d4;}.pt-p .paut{color:#b89ad4;}.pt-r .paut{color:#d47a7a;}
  .pcont{font-size:13px;color:var(--text);line-height:1.6;flex:1;font-style:italic;}
  .pdate{font-size:10px;color:var(--text3);}
  .pdel{position:absolute;top:8px;right:10px;font-size:14px;cursor:pointer;opacity:0;color:var(--text3);background:none;border:none;font-family:inherit;transition:opacity 0.1s;}
  .postit:hover .pdel{opacity:0.5;}
  .pdel:hover{opacity:1 !important;}
  .nueva{background:var(--bg2);border:0.5px dashed var(--border2);border-radius:var(--r);padding:14px;min-height:140px;display:flex;flex-direction:column;gap:8px;}
  .nueva input{background:transparent;border:none;border-bottom:0.5px solid var(--border2);color:var(--accent);font-size:11px;padding:4px 0;letter-spacing:0.06em;text-transform:uppercase;font-family:inherit;width:100%;}
  .nueva input:focus{outline:none;border-bottom-color:var(--accent);}
  .nueva textarea{background:transparent;border:none;color:var(--text);font-size:13px;font-family:'Georgia',serif;resize:none;flex:1;line-height:1.6;font-style:italic;}
  .nueva textarea:focus{outline:none;}
  .nueva textarea::placeholder{color:var(--text3);}
  .btnnota{align-self:flex-end;padding:5px 14px;background:transparent;border:0.5px solid var(--accent);border-radius:var(--r);font-size:11px;cursor:pointer;color:var(--accent);font-family:inherit;letter-spacing:0.05em;}
  .btnnota:hover{background:rgba(200,184,154,0.08);}
  .empty{text-align:center;padding:4rem 1rem;color:var(--text3);font-size:13px;}
  .loading{text-align:center;padding:4rem;color:var(--text3);font-size:12px;letter-spacing:0.1em;}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center;}
  .overlay.show{display:flex;}
  .modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--rl);padding:1.5rem;width:min(480px,92vw);max-height:85vh;overflow-y:auto;}
  .modal h3{font-size:14px;font-weight:normal;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1.25rem;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;letter-spacing:0.06em;text-transform:uppercase;}
  .field input,.field textarea,.field select{width:100%;font-size:13px;padding:8px 11px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Georgia',serif;resize:vertical;transition:border-color 0.12s;}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);}
  .field select option{background:var(--bg3);}
  .mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
  .btncancel{padding:7px 16px;background:transparent;border:0.5px solid var(--border2);border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;}
  .btncancel:hover{background:var(--bg3);}
  .btnsave{padding:7px 16px;background:transparent;border:0.5px solid var(--accent);border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--accent);font-family:inherit;letter-spacing:0.05em;}
  .btnsave:hover{background:rgba(200,184,154,0.08);}
  .tpills{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
  .tpill{font-size:11px;padding:3px 10px;border-radius:10px;background:var(--bg3);border:0.5px solid var(--border);cursor:pointer;color:var(--text3);font-family:inherit;transition:all 0.1s;}
  .tpill:hover{color:var(--text2);border-color:var(--border2);}
  .tpill.on{background:rgba(200,184,154,0.1);border-color:var(--accent);color:var(--accent);}
  .avlbl{font-size:10px;color:var(--text3);letter-spacing:0.05em;display:block;margin-top:8px;text-transform:uppercase;}
  .errmsg{font-size:11px;color:var(--disc-t);margin-top:6px;display:none;}
</style>
</head>
<body>
<header class="hdr">
  <div class="htitle">Visionado FF</div>
  <div class="hright">
    <div class="stats" id="stats"></div>
    <button class="btnadd" id="btnadd" onclick="openAdd()">+ Agregar pieza</button>
  </div>
</header>
<div class="tabs">
  <button class="tab active" onclick="showTab('col')">Colección</button>
  <button class="tab" onclick="showTab('piz')">Pizarra</button>
</div>
<div id="tab-col">
  <div class="fbar" id="fbar"></div>
  <div class="main">
    <div class="loading" id="loading">Cargando colección…</div>
    <div class="grid" id="grid" style="display:none"></div>
    <div class="empty" id="empty" style="display:none">Sin piezas con ese filtro.</div>
  </div>
</div>
<div id="tab-piz" style="display:none">
  <div class="pizarra">
    <div class="piz-hdr">
      <h2>Pizarra de ideas</h2>
      <div class="cpicker">
        <span style="font-size:11px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase">Color</span>
        <div class="cdot cd-y active" data-c="y" onclick="selColor('y')"></div>
        <div class="cdot cd-g" data-c="g" onclick="selColor('g')"></div>
        <div class="cdot cd-b" data-c="b" onclick="selColor('b')"></div>
        <div class="cdot cd-p" data-c="p" onclick="selColor('p')"></div>
        <div class="cdot cd-r" data-c="r" onclick="selColor('r')"></div>
      </div>
    </div>
    <div class="pgrid" id="pgrid"></div>
  </div>
</div>
<div class="overlay" id="modal-add">
  <div class="modal">
    <h3 id="mtitle">Nueva pieza</h3>
    <div class="field"><label>URL (Internet Archive, YouTube, Vimeo)</label><input type="text" id="f-url" placeholder="https://archive.org/details/..."/></div>
    <div class="field"><label>Título</label><input type="text" id="f-title" placeholder="Nombre de la pieza"/></div>
    <div class="field"><label>Año / fuente</label><input type="text" id="f-meta" placeholder="ej. 1968 · Prelinger Archives"/></div>
    <div class="field"><label>Nota</label><textarea id="f-note" rows="3" placeholder="Impresiones, contexto…"></textarea></div>
    <div class="field">
      <label>Etiquetas</label>
      <span class="avlbl">Existentes</span>
      <div class="tpills" id="avail-tags"></div>
      <input type="text" id="f-newtag" placeholder="Nueva etiqueta → Enter" style="margin-top:8px"/>
      <div class="tpills" id="sel-tags" style="margin-top:6px"></div>
    </div>
    <div class="field"><label>Estado</label>
      <select id="f-status">
        <option value="pending">En revisión</option>
        <option value="selected">Seleccionada</option>
        <option value="discarded">Descartada</option>
      </select>
    </div>
    <div class="errmsg" id="errmsg">URL y título son obligatorios.</div>
    <div class="mbtns">
      <button class="btncancel" onclick="closeAdd()">Cancelar</button>
      <button class="btnsave" id="btnsavelbl" onclick="saveItem()">Guardar</button>
    </div>
  </div>
</div>
<div class="overlay" id="modal-note">
  <div class="modal">
    <h3>Nota</h3>
    <div class="field"><textarea id="note-text" rows="5" style="min-height:100px"></textarea></div>
    <div class="mbtns">
      <button class="btncancel" onclick="closeNote()">Cancelar</button>
      <button class="btnsave" onclick="saveNote()">Guardar</button>
    </div>
  </div>
</div>
<script>
const SB='https://vraxnskpfiqzbwxonyde.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyYXhuc2twZmlxemJ3eG9ueWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTgwNjcsImV4cCI6MjA5NjI3NDA2N30.JTR2R36d44FIf9eYrctCzoudp3eI3tRFuCAtYn5jm5A';
const H={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'};
const HD={'apikey':SK,'Authorization':'Bearer '+SK};
let items=[],notas=[],activeTag='all',activeSt='all',editingId=null,editingNoteId=null,selTags=[],selColor='y';
async function fetchAll(){
  const[r1,r2]=await Promise.all([fetch(SB+'/rest/v1/pieces?order=created_at.desc',{headers:H}),fetch(SB+'/rest/v1/notes?order=created_at.desc',{headers:H})]);
  items=await r1.json();notas=await r2.json();render();renderPiz();
}
function allTags(){const t=new Set();items.forEach(i=>(i.tags||[]).forEach(x=>t.add(x)));return[...t].sort();}
function embedUrl(url){
  if(!url)return null;
  if(url.includes('archive.org/details/')){const id=url.split('archive.org/details/')[1].split('/')[0].split('?')[0];return'https://archive.org/embed/'+id;}
  if(url.includes('youtube.com/watch')){const v=new URLSearchParams(url.split('?')[1]).get('v');return'https://www.youtube.com/embed/'+v;}
  if(url.includes('youtu.be/'))return'https://www.youtube.com/embed/'+url.split('youtu.be/')[1].split('?')[0];
  if(url.includes('vimeo.com/'))return'https://player.vimeo.com/video/'+url.split('vimeo.com/')[1].split('?')[0];
  return null;
}
function slbl(s){return{pending:'en revisión',selected:'seleccionada',discarded:'descartada'}[s]||s;}
function scls(s){return{pending:'sb-p',selected:'sb-s',discarded:'sb-d'}[s];}
function render(){
  document.getElementById('loading').style.display='none';
  const f=items.filter(i=>(activeTag==='all'||(i.tags||[]).includes(activeTag))&&(activeSt==='all'||i.status===activeSt));
  const tot=items.length,s=items.filter(i=>i.status==='selected').length,p=items.filter(i=>i.status==='pending').length,d=items.filter(i=>i.status==='discarded').length;
  document.getElementById('stats').innerHTML=`<span>${tot} piezas</span><span style="color:var(--sel-t)">${s} sel.</span><span style="color:var(--pen-t)">${p} rev.</span><span style="color:var(--disc-t)">${d} desc.</span>`;
  const tags=allTags();
  document.getElementById('fbar').innerHTML=
    `<button class="ftag ${activeTag==='all'?'active':''}" onclick="setTag('all')">Todas</button>`+
    tags.map(t=>`<button class="ftag ${activeTag===t?'active':''}" onclick="setTag('${t}')">${t}</button>`).join('')+
    `<span class="fsep">·</span><button class="fst fst-all ${activeSt==='all'?'active':''}" onclick="setSt('all')">todo</button><button class="fst fst-s ${activeSt==='selected'?'active':''}" onclick="setSt('selected')">seleccionadas</button><button class="fst fst-p ${activeSt==='pending'?'active':''}" onclick="setSt('pending')">en revisión</button><button class="fst fst-d ${activeSt==='discarded'?'active':''}" onclick="setSt('discarded')">descartadas</button>`;
  const grid=document.getElementById('grid'),empty=document.getElementById('empty');
  if(f.length===0){grid.style.display='none';empty.style.display='block';return;}
  empty.style.display='none';grid.style.display='grid';
  grid.innerHTML=f.map(item=>{
    const emb=embedUrl(item.url),note=item.note||'';
    return`<div class="card">${emb?`<div class="cembed"><iframe src="${emb}" allow="fullscreen" loading="lazy"></iframe></div>`:''}<div class="cbody"><div class="ctop"><span class="ctitle">${item.title}</span><button class="sbadge ${scls(item.status)}" onclick="cycleStatus(${item.id})">${slbl(item.status)}</button></div>${(item.tags||[]).length?`<div class="ctags">${item.tags.map(t=>`<span class="ctag">${t}</span>`).join('')}</div>`:''}<div class="cnote ${note?'':'empty'}" onclick="openNote(${item.id})">${note||'agregar nota…'}</div><div class="cmeta">${item.meta?item.meta+' · ':''}<a href="${item.url}" target="_blank">ver original ↗</a> · <span style="cursor:pointer;color:var(--text3)" onclick="openEdit(${item.id})">editar</span> · <span style="cursor:pointer;color:var(--disc-t)" onclick="deleteItem(${item.id})">eliminar</span></div></div></div>`;
  }).join('');
}
function renderPiz(){
  const nueva=`<div class="nueva"><input type="text" id="naut" placeholder="Tu nombre" maxlength="30"/><textarea id="ncont" rows="4" placeholder="Escribe una idea…"></textarea><button class="btnnota" onclick="saveNota()">Agregar nota</button></div>`;
  const posts=notas.map(n=>{
    const d=new Date(n.created_at),f=d.toLocaleDateString('es-CL',{day:'2-digit',month:'short'});
    return`<div class="postit pt-${n.color}"><button class="pdel" onclick="deleteNota(${n.id})">×</button><div class="paut">${n.author||'anónimo'}</div><div class="pcont">${n.content}</div><div class="pdate">${f}</div></div>`;
  }).join('');
  document.getElementById('pgrid').innerHTML=nueva+posts;
  const saved=localStorage.getItem('ff_author');
  if(saved)document.getElementById('naut').value=saved;
}
function selColor(c){selColor=c;document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('active'));document.querySelector('[data-c="'+c+'"]').classList.add('active');}
async function saveNota(){
  const author=document.getElementById('naut').value.trim()||'anónimo';
  const content=document.getElementById('ncont').value.trim();
  if(!content)return;
  localStorage.setItem('ff_author',author);
  const r=await fetch(SB+'/rest/v1/notes',{method:'POST',headers:H,body:JSON.stringify({author,content,color:selColor})});
  const res=await r.json();
  if(Array.isArray(res)&&res[0])notas.unshift(res[0]);
  renderPiz();
}
async function deleteNota(id){
  if(!confirm('¿Eliminar esta nota?'))return;
  notas=notas.filter(n=>n.id!==id);renderPiz();
  await fetch(SB+'/rest/v1/notes?id=eq.'+id,{method:'DELETE',headers:HD});
}
function showTab(t){
  document.getElementById('tab-col').style.display=t==='col'?'block':'none';
  document.getElementById('tab-piz').style.display=t==='piz'?'block':'none';
  document.getElementById('btnadd').style.display=t==='col'?'flex':'none';
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='col')||(i===1&&t==='piz')));
}
function setTag(t){activeTag=t;render();}
function setSt(s){activeSt=s;render();}
async function cycleStatus(id){
  const item=items.find(i=>i.id===id);
  const c={pending:'selected',selected:'discarded',discarded:'pending'};
  item.status=c[item.status];render();
  await fetch(SB+'/rest/v1/pieces?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify({status:item.status})});
}
function openNote(id){editingNoteId=id;document.getElementById('note-text').value=items.find(i=>i.id===id).note||'';document.getElementById('modal-note').classList.add('show');}
function closeNote(){document.getElementById('modal-note').classList.remove('show');}
async function saveNote(){
  const note=document.getElementById('note-text').value;
  items.find(i=>i.id===editingNoteId).note=note;render();
  await fetch(SB+'/rest/v1/pieces?id=eq.'+editingNoteId,{method:'PATCH',headers:H,body:JSON.stringify({note})});
  closeNote();
}
function renderModalTags(){
  document.getElementById('avail-tags').innerHTML=allTags().map(t=>`<button class="tpill ${selTags.includes(t)?'on':''}" onclick="toggleTag('${t}')">${t}</button>`).join('');
  document.getElementById('sel-tags').innerHTML=selTags.map(t=>`<button class="tpill on" onclick="toggleTag('${t}')">${t} ×</button>`).join('');
}
function toggleTag(t){selTags=selTags.includes(t)?selTags.filter(x=>x!==t):[...selTags,t];renderModalTags();}
function openAdd(){
  editingId=null;selTags=[];
  ['f-url','f-title','f-meta','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-status').value='pending';
  document.getElementById('mtitle').textContent='Nueva pieza';
  document.getElementById('btnsavelbl').textContent='Agregar';
  document.getElementById('errmsg').style.display='none';
  renderModalTags();document.getElementById('modal-add').classList.add('show');
}
function openEdit(id){
  const item=items.find(i=>i.id===id);editingId=id;selTags=[...(item.tags||[])];
  document.getElementById('f-url').value=item.url;
  document.getElementById('f-title').value=item.title;
  document.getElementById('f-meta').value=item.meta||'';
  document.getElementById('f-note').value=item.note||'';
  document.getElementById('f-status').value=item.status;
  document.getElementById('mtitle').textContent='Editar pieza';
  document.getElementById('btnsavelbl').textContent='Guardar cambios';
  document.getElementById('errmsg').style.display='none';
  renderModalTags();document.getElementById('modal-add').classList.add('show');
}
function closeAdd(){document.getElementById('modal-add').classList.remove('show');}
async function saveItem(){
  const url=document.getElementById('f-url').value.trim(),title=document.getElementById('f-title').value.trim();
  if(!url||!title){document.getElementById('errmsg').style.display='block';return;}
  const data={url,title,meta:document.getElementById('f-meta').value.trim(),note:document.getElementById('f-note').value.trim(),tags:selTags,status:document.getElementById('f-status').value};
  closeAdd();
  if(editingId){Object.assign(items.find(i=>i.id===editingId),data);render();await fetch(SB+'/rest/v1/pieces?id=eq.'+editingId,{method:'PATCH',headers:H,body:JSON.stringify(data)});}
  else{const r=await fetch(SB+'/rest/v1/pieces',{method:'POST',headers:H,body:JSON.stringify(data)});const res=await r.json();if(Array.isArray(res)&&res[0])items.unshift(res[0]);render();}
}
async function deleteItem(id){
  if(!confirm('¿Eliminar esta pieza?'))return;
  items=items.filter(i=>i.id!==id);render();
  await fetch(SB+'/rest/v1/pieces?id=eq.'+id,{method:'DELETE',headers:HD});
}
document.getElementById('f-newtag').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();const v=e.target.value.trim();if(v&&!selTags.includes(v))selTags.push(v);e.target.value='';renderModalTags();}});
document.getElementById('modal-add').addEventListener('click',e=>{if(e.target===document.getElementById('modal-add'))closeAdd();});
document.getElementById('modal-note').addEventListener('click',e=>{if(e.target===document.getElementById('modal-note'))closeNote();});
fetchAll();
</script>
</body>
